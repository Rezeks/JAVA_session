spring:
  application:
    name: secure-messaging-system
  datasource:
    url: jdbc:postgresql://localhost:5432/securemsg
    username: postgres
    password: 123123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: securemsg-demo
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 0  # не ждать — Kafka опциональна
      properties:
        request.timeout.ms: 3000      # быстрый таймаут (3 сек)
        max.block.ms: 3000            # не блокировать надолго
    listener:
      missing-topics-fatal: false     # не падать если топик не существует
server:
  port: 8080

securemsg:
  kafka:
    consumer-enabled: true
  encryption:
    default-method: AES_256_GCM
  jwt:
    secret: SecureMessagingSystemJwtSecretKey2026!
    expiration-ms: 3600000  # 1 hour

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
info:
  app:
    name: Secure Messaging System
    version: 1.0.0
    description: Защищённая система обмена сообщениями
